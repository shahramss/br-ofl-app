name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter Android project
        working-directory: mobile_app
        run: |
          flutter --version
          flutter create --platforms=android --project-name product_specs_app .
          rm -rf test

      - name: Install dependencies
        working-directory: mobile_app
        run: flutter pub get

      - name: Add Android permissions and app label
        working-directory: mobile_app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          manifest = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          perms = '''<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />'''
          if 'android.permission.INTERNET' not in text:
              text = text.replace(manifest, perms)
          text = text.replace('android:label="product_specs_app"', 'android:label="اپ مشخصات محصول"')
          path.write_text(text)
          PY

      - name: Build Debug APK
        working-directory: mobile_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-specs-debug-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
